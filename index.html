<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Superhéroes 🦸‍♂️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Buscador de Superhéroes</h1>
        <p>Introduce el nombre de un superhéroe o villano (ej. Batman, Iron Man, Joker)</p>
        
        <div class="search-box">
            <input type="text" id="heroInput" placeholder="Nombre del personaje...">
            <button id="searchBtn">Buscar</button>
        </div>

        <!-- Aquí se mostrarán los resultados -->
        <div id="results" class="results-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
